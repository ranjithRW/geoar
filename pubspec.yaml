name: geoar
description: GeoAR – GPS-Based Augmented Reality Platform with Interactive Multimedia Content
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps
  google_maps_flutter: ^2.6.0

  # Location & Sensors
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  flutter_compass: ^0.8.0
  sensors_plus: ^5.0.0

  # Camera
  camera: ^0.11.0

  # Media
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  video_player: ^2.8.0
  image: ^4.1.0
  path: ^1.9.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.0

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  share_plus: ^10.0.0

  # UI & Animation
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  flutter_staggered_animations: ^1.1.1
  # Navigation
  url_launcher: ^6.3.0

  # Icons
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/models/

